<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Theft Detection</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family: 'Segoe UI', sans-serif;
}

.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding:20px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
    transition:0.3s;
}
.card:hover{
    transform:scale(1.03);
}

.glow{
    box-shadow:0 0 15px red;
}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold text-center mb-8">⚡ Electricity Theft Detection Dashboard</h1>

<div class="grid md:grid-cols-4 gap-6">

    <div class="card text-center">
        <h2>Total Meters</h2>
        <p id="stat-total-meters" class="text-2xl font-bold">0</p>
    </div>

    <div class="card text-center">
        <h2>Normal</h2>
        <p id="stat-normal" class="text-2xl font-bold text-green-400">0</p>
    </div>

    <div class="card text-center">
        <h2>Suspicious</h2>
        <p id="stat-suspicious" class="text-2xl font-bold text-yellow-400">0</p>
    </div>

    <div class="card text-center glow hidden" id="theft-badge">
        <h2>Theft Detected</h2>
        <p id="stat-theft" class="text-2xl font-bold text-red-500">0</p>
    </div>

</div>

<br>

<div class="grid md:grid-cols-3 gap-6">

    <div class="card text-center">
        <h2>Meter Reading (kWh)</h2>
        <p id="meterReading" class="text-2xl font-bold">0</p>
    </div>

    <div class="card text-center">
        <h2>Live Power Flow (W)</h2>
        <p id="powerFlow" class="text-2xl font-bold">0</p>
    </div>

    <div class="card text-center">
        <h2>System Status</h2>
        <p id="systemStatus" class="text-2xl font-bold">Unknown</p>
    </div>

</div>

<br>

<div class="grid md:grid-cols-2 gap-6">

    <div class="card text-center">
        <h2>Sensor 1</h2>
        <p id="sensor1-value" class="text-2xl font-bold">0</p>
    </div>

    <div class="card text-center">
        <h2>Sensor 2</h2>
        <p id="sensor2-value" class="text-2xl font-bold">0</p>
    </div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "electricity-theft-detect-74a20.firebaseapp.com",
  databaseURL: "https://electricity-theft-detect-74a20-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "electricity-theft-detect-74a20",
  storageBucket: "electricity-theft-detect-74a20.firebasestorage.app",
  messagingSenderId: "749521881195",
  appId: "1:749521881195:web:4857b81163dd582f70c92e"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// Dashboard
const dashboardRef = ref(database, "dashboard");

onValue(dashboardRef, (snapshot) => {
    const data = snapshot.val();
    if(!data) return;

    document.getElementById("stat-total-meters").textContent = data.totalMeters || 0;
    document.getElementById("stat-normal").textContent = data.normal || 0;
    document.getElementById("stat-suspicious").textContent = data.suspicious || 0;
    document.getElementById("stat-theft").textContent = data.theft || 0;
    document.getElementById("meterReading").textContent = data.meterReading || 0;
    document.getElementById("powerFlow").textContent = data.powerFlow || 0;

    const statusEl = document.getElementById("systemStatus");
    statusEl.textContent = data.systemStatus || "Unknown";

    if(data.systemStatus === "Alert"){
        statusEl.classList.add("text-red-500");
        document.getElementById("theft-badge").classList.remove("hidden");
    }else{
        statusEl.classList.remove("text-red-500");
        document.getElementById("theft-badge").classList.add("hidden");
    }
});

// Sensors
const sensorRef = ref(database, "sensor");

onValue(sensorRef, (snapshot) => {
    const sensor = snapshot.val();
    if(!sensor) return;

    document.getElementById("sensor1-value").textContent = sensor.sensor1 || 0;
    document.getElementById("sensor2-value").textContent = sensor.sensor2 || 0;
});

</script>

</body>
</html>
