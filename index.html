<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electricity Theft Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .card h2 {
            margin: 10px 0;
            font-size: 28px;
        }

        .status-normal { color: #22c55e; }
        .status-alert { color: #ef4444; }

        .hidden { display: none; }

        .badge {
            background: red;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h1>⚡ Electricity Theft Detection Dashboard</h1>

<div class="dashboard">

    <div class="card">
        <h3>Total Meters</h3>
        <h2 id="stat-total-meters">0</h2>
    </div>

    <div class="card">
        <h3>Normal</h3>
        <h2 id="stat-normal">0</h2>
    </div>

    <div class="card">
        <h3>Suspicious</h3>
        <h2 id="stat-suspicious">0</h2>
    </div>

    <div class="card">
        <h3>Theft Cases</h3>
        <h2 id="stat-theft">0</h2>
        <div id="theft-badge" class="badge hidden">ALERT</div>
    </div>

    <div class="card">
        <h3>Meter Reading</h3>
        <h2><span id="meterReading">0</span> kWh</h2>
    </div>

    <div class="card">
        <h3>Live Power Flow</h3>
        <h2><span id="powerFlow">0</span> W</h2>
    </div>

    <div class="card">
        <h3>System Status</h3>
        <h2 id="systemStatus" class="status-normal">Loading...</h2>
    </div>

    <div class="card">
        <h3>Sensor 1</h3>
        <h2><span id="sensor1">0</span></h2>
    </div>

    <div class="card">
        <h3>Sensor 2</h3>
        <h2><span id="sensor2">0</span></h2>
    </div>

</div>


<!-- Firebase Script -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXmOoO-Js2jRN6eUeZ4fVTUzutdrOoL_g",
  authDomain: "electricity-theft-detect-74a20.firebaseapp.com",
  databaseURL: "https://electricity-theft-detect-74a20-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "electricity-theft-detect-74a20",
  storageBucket: "electricity-theft-detect-74a20.firebasestorage.app",
  messagingSenderId: "749521881195",
  appId: "1:749521881195:web:4857b81163dd582f70c92e"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


// ===== DASHBOARD DATA =====
const dashRef = ref(database, "dashboard");

onValue(dashRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    document.getElementById("stat-total-meters").innerText = data.totalMeters || 0;
    document.getElementById("stat-normal").innerText = data.normal || 0;
    document.getElementById("stat-suspicious").innerText = data.suspicious || 0;
    document.getElementById("stat-theft").innerText = data.theft || 0;

    document.getElementById("meterReading").innerText = data.meterReading || 0;
    document.getElementById("powerFlow").innerText = data.powerFlow || 0;

    const statusElement = document.getElementById("systemStatus");
    statusElement.innerText = data.systemStatus || "Unknown";

    if (data.systemStatus === "Alert") {
        statusElement.classList.remove("status-normal");
        statusElement.classList.add("status-alert");
    } else {
        statusElement.classList.remove("status-alert");
        statusElement.classList.add("status-normal");
    }

    if (data.theft > 0) {
        document.getElementById("theft-badge").classList.remove("hidden");
    } else {
        document.getElementById("theft-badge").classList.add("hidden");
    }
});


// ===== SENSOR DATA =====
const sensorRef = ref(database, "sensor");

onValue(sensorRef, (snapshot) => {
    const sdata = snapshot.val();
    if (!sdata) return;

    document.getElementById("sensor1").innerText = sdata.sensor1 || 0;
    document.getElementById("sensor2").innerText = sdata.sensor2 || 0;
});

</script>

</body>
</html>
